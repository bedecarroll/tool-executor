version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-minor-days: 7
      semver-major-days: 30
    ignore:
      # Upstream sqlite-vec releases are currently not safe to adopt automatically.
      - dependency-name: sqlite-vec
    groups:
      all-version-updates:
        patterns:
          - '*'
      all-security-updates:
        applies-to: security-updates
        patterns:
          - '*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      all-version-updates:
        patterns:
          - '*'
      all-security-updates:
        applies-to: security-updates
        patterns:
          - '*'
