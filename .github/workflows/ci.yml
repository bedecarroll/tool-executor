name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # Required for Codecov Test Analytics uploads.
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696
      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925

      # rustup caches can omit components; install them explicitly to guarantee rustfmt/clippy availability.
      - name: Install rust components
        run: rustup component add --toolchain 1.90.0 rustfmt clippy llvm-tools-preview

      - name: Cache cargo builds
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          cache-targets: true

      - name: Format
        run: mise run fmt

      - name: Lint
        run: mise run lint

      - name: Tests (nextest)
        run: mise run test

      - name: Doctests
        run: mise run test-doc

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ env.CODECOV_TOKEN }}
          report_type: test_results
          files: target/nextest/ci/junit.xml
          flags: rust-unit
          name: test-results-${{ matrix.os }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: nextest-junit-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: error
      - name: Generate coverage report
        if: success()
        shell: bash
        run: |
          mkdir -p coverage
          cargo llvm-cov report --lcov --output-path coverage/lcov.info
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cargo llvm-cov report --html --output-dir coverage/html
          fi

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          files: coverage/lcov.info
          flags: rust-unit
          name: coverage-${{ matrix.os }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage artifact
        if: ${{ success() && matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-html
          path: coverage/html
          if-no-files-found: error
